services:
  db_test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-dictionary_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-dictionary_user}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-dictionary_pass}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-dictionary_user} -d ${POSTGRES_TEST_DB:-dictionary_test}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
