services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      INTERNAL_API_URL: http://web:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dictionary}
      POSTGRES_USER: ${POSTGRES_USER:-dictionary_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dictionary_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dictionary_user}:${POSTGRES_PASSWORD:-dictionary_pass}@db:5432/${POSTGRES_DB:-dictionary}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
